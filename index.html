<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            margin: 0;
        }
        main {
            max-width: 420px;
            margin: 40px auto;
            background: #fff;
            padding: 28px 24px 20px 24px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(80, 80, 180, 0.10);
            position: relative;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        #taskInput {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #c7d2fe;
            outline: none;
            font-size: 1rem;
            background: #f1f5f9;
            transition: border 0.2s;
        }
        #taskInput:focus {
            border: 1.5px solid #6366f1;
            background: #fff;
        }
        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(99,102,241,0.08);
            transition: background 0.2s, transform 0.1s;
        }
        .add-btn:hover {
            background: linear-gradient(90deg, #4f46e5 60%, #6366f1 100%);
            transform: translateY(-2px) scale(1.03);
        }

        #searchInput {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #c7d2fe;
            background: #f1f5f9;
            font-size: 1rem;
            margin-bottom: 10px;
            outline: none;
            transition: border 0.2s;
        }
        #searchInput:focus {
            border: 1.5px solid #6366f1;
            background: #fff;
        }

        #taskList > div {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 10px;
            margin-bottom: 10px;
            background: #f9fafb;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(99,102,241,0.04);
        }
    </style>
</head>
<body>

<main>

    <section class="input-row">
        <input id="taskInput" type="text" placeholder="Tambah tugas...">
        <button class="add-btn" onclick="tambahTask()">Tambah</button>
    </section>

    <section style="margin-bottom: 15px;">
        <input id="searchInput" type="text" placeholder="Cari tugas..." onkeyup="cari()">
    </section>

    <section id="taskList"></section>

</main>

<script>
    function tambahTask() {
        let input = document.getElementById("taskInput");
        let text = input.value.trim();
        if (text === "") return;

        let div = document.createElement("div");

        let checkbox = document.createElement("input");
        checkbox.type = "checkbox";

        let label = document.createElement("label");
        label.innerText = text;

        div.appendChild(checkbox);
        div.appendChild(label);

        document.getElementById("taskList").appendChild(div);
        input.value = "";
    }

    function cari() {
        let keyword = document.getElementById("searchInput").value.toLowerCase();
        let list = document.getElementById("taskList").children;

        for (let item of list) {
            let text = item.innerText.toLowerCase();
            item.style.display = text.includes(keyword) ? "" : "none";
        }
    }
</script>

</body>
</html>
